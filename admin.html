<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoot Bangla - Admin Pro</title>
    <style>
        /* CORE DARK HORROR THEME */
        :root {
            --bg-color: #0d0d0d;
            --card-bg: rgba(20, 20, 20, 0.8);
            --neon-red: #ff003c;
            --text-main: #e0e0e0;
            --glass-border: rgba(255, 0, 60, 0.3);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 20px;
        }
        h1, h2, h3 { color: var(--neon-red); text-align: center; text-transform: uppercase; letter-spacing: 2px;}
        
        /* GLASSMORPHISM CARDS */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(255, 0, 60, 0.1);
        }

        /* BUTTONS & INPUTS */
        button {
            background: transparent; color: var(--neon-red);
            border: 1px solid var(--neon-red); padding: 8px 15px;
            border-radius: 5px; cursor: pointer; transition: 0.3s;
            font-weight: bold;
        }
        button:hover { background: var(--neon-red); color: white; }
        input[type="number"], input[type="date"], input[type="text"] {
            background: #1a1a1a; color: white; border: 1px solid #333;
            padding: 8px; border-radius: 4px;
        }

        /* GRID SYSTEM */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .dashboard-grid { grid-template-columns: 1fr; } }

        /* THERMAL PRINTER CSS - MAGIC LIES HERE */
        #print-receipt { display: none; }
        @media print {
            body * { visibility: hidden; } 
            #print-receipt, #print-receipt * { visibility: visible; } 
            #print-receipt {
                display: block; position: absolute; left: 0; top: 0;
                width: 300px; 
                background: white; color: black; font-family: monospace;
                padding: 10px; font-size: 14px;
            }
            .bill-header { text-align: center; border-bottom: 1px dashed black; padding-bottom: 5px; margin-bottom: 5px; }
            .bill-item { display: flex; justify-content: space-between; margin-bottom: 3px; }
            .bill-total { border-top: 1px dashed black; padding-top: 5px; font-weight: bold; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div id="login-screen" style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <h1>Enter Vault PIN</h1>
        <input type="password" id="vault-pin" placeholder="****" style="font-size: 20px; text-align: center; width: 100px;">
        <br><button onclick="checkPin()">UNLOCK</button>
    </div>

    <div id="main-dashboard" style="display: none;">
        <h1>🦇 Bhoot Bangla Command Center</h1>
        
        <div style="text-align: center; margin-bottom: 20px;">
            <button onclick="switchTab('live-orders')">🔴 Live Orders</button>
            <button onclick="switchTab('sales-ledger')">📊 Sales Ledger</button>
            <button onclick="switchTab('menu-manager')">📋 Menu Manager</button>
        </div>

        <div id="live-orders" class="tab-content">
            <h2>Live Targets (Orders)</h2>
            <div class="dashboard-grid" id="orders-container"></div>
        </div>

        <div id="sales-ledger" class="tab-content" style="display: none;">
            <h2>Vault History</h2>
            <div class="card" style="text-align: center;">
                <label>Select Date: </label>
                <input type="date" id="history-date" onchange="loadHistory()">
                <h3 style="color: white;">Total Revenue: ₹<span id="day-total" style="color: var(--neon-red);">0</span></h3>
            </div>
            <div id="history-container"></div>
        </div>

        <div id="menu-manager" class="tab-content" style="display: none;">
            <h2>Grimoire (Menu Manager)</h2>
            <div class="card dashboard-grid">
                <div>
                    <input type="text" id="new-item-name" placeholder="Item Name">
                    <input type="number" id="new-item-price" placeholder="Price (₹)">
                    <button onclick="addMenuItem()">Add to Menu</button>
                </div>
            </div>
            <div id="menu-list-container" class="dashboard-grid"></div>
        </div>
    </div>

    <div id="print-receipt">
        <div class="bill-header">
            <h2>BHOOT BANGLA</h2>
            <p>Bagaha's Scariest Cafe</p>
            <p id="bill-datetime"></p>
            <p><strong>Order Type: </strong><span id="bill-type"></span></p>
            <p><strong>Table/Parcel No: </strong><span id="bill-table"></span></p>
        </div>
        <div id="bill-items"></div>
        <div class="bill-total">
            <div class="bill-item"><span>Subtotal:</span><span id="bill-subtotal"></span></div>
            <div class="bill-item"><span>Discount (<span id="bill-discount-percent">0</span>%):</span><span id="bill-discount-amt"></span></div>
            <div class="bill-item" style="font-size: 18px;"><span>TOTAL:</span><span id="bill-final"></span></div>
        </div>
        <div class="bill-header" style="margin-top: 10px; border: none;">
            <p>Thank you! Visit Again... If you survive! 🦇</p>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
const firebaseConfig = {
          apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
          authDomain: "bhoot-bangla-41807.firebaseapp.com",
          databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
          projectId: "bhoot-bangla-41807",
          storageBucket: "bhoot-bangla-41807.firebasestorage.app",
          messagingSenderId: "1065037227059",
          appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Utility: Get Today's Date
        const getTodayDate = () => new Date().toISOString().split('T')[0];
        let todayDate = getTodayDate();
        document.getElementById('history-date').value = todayDate;

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }

        window.checkPin = function() {
            if(document.getElementById('vault-pin').value === '0707') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                loadLiveOrders();
                loadMenuManager();
                loadHistory(); 
            } else { alert('Access Denied!'); }
        }

        function loadLiveOrders() {
            const ordersRef = ref(db, 'orders/' + todayDate);
            onValue(ordersRef, (snapshot) => {
                const container = document.getElementById('orders-container');
                container.innerHTML = '';
                snapshot.forEach((childSnapshot) => {
                    const order = childSnapshot.val();
                    const orderId = childSnapshot.key;
                    
                    if(order.status === 'live') {
                        let typeBadge = order.table.toLowerCase().includes('parcel') ? '🥡 PARCEL' : '🍽️ DINE-IN';
                        
                        let card = `<div class="card">
                            <h3>${typeBadge} - ${order.table.toUpperCase()}</h3>
                            <p>Customer: ${order.phone || 'N/A'}</p>
                            <hr style="border-color: #333;">
                            <ul style="list-style: none; padding: 0;">`;
                        
                        let subtotal = 0;
                        order.items.forEach(item => {
                            card += `<li>${item.name} x ${item.qty} = ₹${item.price * item.qty}</li>`;
                            subtotal += (item.price * item.qty);
                        });

                        card += `</ul>
                            <p><strong>Subtotal: ₹${subtotal}</strong></p>
                            
                            <label style="font-size:12px;">Discount (0-12%):</label>
                            <input type="number" id="disc-${orderId}" min="0" max="12" value="0" style="width: 50px;">
                            
                            <br><br>
                            <button onclick="printAndComplete('${orderId}', '${order.table}', '${typeBadge}', ${subtotal})">🖨️ Print Bill & Complete</button>
                        </div>`;
                        container.innerHTML += card;
                    }
                });
            });
        }

        window.printAndComplete = function(orderId, table, typeBadge, subtotal) {
            let discountPercent = document.getElementById(`disc-${orderId}`).value;
            if(discountPercent > 12) discountPercent = 12; 
            if(discountPercent < 0) discountPercent = 0;

            let discountAmount = (subtotal * discountPercent) / 100;
            let finalTotal = Math.round(subtotal - discountAmount);

            document.getElementById('bill-datetime').innerText = new Date().toLocaleString();
            document.getElementById('bill-type').innerText = typeBadge;
            document.getElementById('bill-table').innerText = table.toUpperCase();
            document.getElementById('bill-items').innerHTML = `<p>Items as ordered...</p>`; 
            document.getElementById('bill-subtotal').innerText = '₹' + subtotal;
            document.getElementById('bill-discount-percent').innerText = discountPercent;
            document.getElementById('bill-discount-amt').innerText = '-₹' + discountAmount;
            document.getElementById('bill-final').innerText = '₹' + finalTotal;

            window.print();

            set(ref(db, `orders/${todayDate}/${orderId}/status`), 'completed');
            set(ref(db, `orders/${todayDate}/${orderId}/finalTotal`), finalTotal);
        }

        window.loadHistory = function() {
            let selectedDate = document.getElementById('history-date').value;
            const historyRef = ref(db, 'orders/' + selectedDate);
            
            onValue(historyRef, (snapshot) => {
                let totalRevenue = 0;
                let container = document.getElementById('history-container');
                container.innerHTML = '';

                snapshot.forEach((childSnapshot) => {
                    const order = childSnapshot.val();
                    if(order.status === 'completed') {
                        totalRevenue += (order.finalTotal || 0);
                        container.innerHTML += `<div class="card" style="border-left: 4px solid green;">
                            <strong>${order.table.toUpperCase()}</strong> - ₹${order.finalTotal || '0'}
                        </div>`;
                    }
                });
                document.getElementById('day-total').innerText = totalRevenue;
            });
        }

        window.loadMenuManager = function() {
            const menuRef = ref(db, 'menu');
            onValue(menuRef, (snapshot) => {
                const container = document.getElementById('menu-list-container');
                container.innerHTML = '';
                snapshot.forEach((childSnapshot) => {
                    const item = childSnapshot.val();
                    container.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span><strong>${item.name}</strong> <br> ₹${item.price}</span>
                        <button onclick="removeMenuItem('${childSnapshot.key}')">❌</button>
                    </div>`;
                });
            });
        }

        window.addMenuItem = function() {
            const name = document.getElementById('new-item-name').value;
            const price = document.getElementById('new-item-price').value;
            if(name && price) {
                push(ref(db, 'menu'), { name: name, price: Number(price) });
                document.getElementById('new-item-name').value = '';
                document.getElementById('new-item-price').value = '';
            }
        }

        window.removeMenuItem = function(key) {
            remove(ref(db, 'menu/' + key));
        }
    </script>
</body>
</html>
