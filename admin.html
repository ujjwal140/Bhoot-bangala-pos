<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhoot Bangla | Admin Command Center</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #020202; color: #e0e0e0; font-family: 'Outfit', sans-serif; }
        
        /* Command Center Header */
        .header { background: #0a0000; padding: 20px; border-bottom: 2px solid #ff1a1a; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 20px rgba(255,0,0,0.2); }
        .header h1 { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 20px; text-shadow: 0 0 10px #ff1a1a; }
        .alarm-btn { background: #1a0505; color: #ff4444; border: 1px solid #ff4444; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* High-Tech Tabs */
        .tabs { display: flex; background: #0a0a0a; border-bottom: 1px solid #333; }
        .tab-btn { flex: 1; padding: 15px; background: transparent; color: #888; border: none; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { color: #ff1a1a; border-bottom: 3px solid #ff1a1a; background: rgba(255,26,26,0.05); }
        
        /* Glass Orders Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px); border: 1px solid #330000; padding: 20px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.6); border-left: 4px solid #ff1a1a; position: relative; }
        .card.paid { border-left-color: #4caf50; opacity: 0.8; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 10px; }
        .card-title { color: #ff1a1a; font-weight: bold; font-size: 20px; font-family: 'Cinzel', serif; }
        .cancel-btn { background: rgba(255, 0, 0, 0.1); border: 1px solid #ff1a1a; color: #ff1a1a; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .cancel-btn:hover { background: #ff1a1a; color: #000; }
        
        /* Checkbox Pro Styling */
        .discount-bar { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #555; }
        .discount-checkbox { width: 18px; height: 18px; accent-color: #ff1a1a; cursor: pointer; }
        .discount-label { font-size: 13px; color: #bbb; cursor: pointer; }
        
        .action-row { display: flex; gap: 10px; }
        .btn-paid { flex: 1; background: #0e2412; color: #4caf50; border: 1px solid #4caf50; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-done { flex: 1; background: #2a0808; color: #ff4444; border: 1px solid #ff4444; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Lock Screen */
        #pinScreen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #030000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-box { background: #0a0a0a; padding: 40px; border-radius: 15px; border: 1px solid #ff1a1a; text-align: center; box-shadow: 0 0 40px rgba(255, 0, 0, 0.2); }
        .pin-box input { background: transparent; border: 2px solid #330000; color: #fff; padding: 15px; font-size: 24px; text-align: center; width: 100%; border-radius: 8px; margin: 20px 0; outline: none; letter-spacing: 10px; font-family: 'Cinzel', serif; }
        .pin-box button { background: #ff1a1a; color: #000; border: none; padding: 15px 30px; font-weight: bold; font-family: 'Cinzel', serif; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div id="pinScreen">
        <div class="pin-box">
            <h1 style="color:#ff1a1a; font-family:'Cinzel', serif;">ADMIN VAULT</h1>
            <p style="color:#666; font-size:12px; margin-top:5px">RESTRICTED ACCESS ONLY</p>
            <input type="password" id="pinInput" placeholder="****" maxlength="4">
            <button onclick="checkPin()">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="header">
            <h1>COMMAND CENTER</h1>
            <button id="alarmToggle" class="alarm-btn" onclick="toggleAlarm()">🔇 ALARM OFF</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('ordersTab', event)">LIVE ORDERS</button>
            <button class="tab-btn" onclick="showTab('analyticsTab', event)">ANALYTICS</button>
        </div>

        <div id="ordersTab" class="grid"></div>
        
        <div id="analyticsTab" style="display:none; padding:20px;">
            <div style="background:#111; padding:20px; border-radius:12px; border:1px solid #333; text-align:center;">
                <h3 style="color:#aaa; font-size:14px">TOTAL REVENUE</h3>
                <h1 id="totalRevenue" style="color:#4caf50; font-size:40px; margin-top:10px">₹0</h1>
                <p style="color:#666; font-size:12px; margin-top:10px">Requires 'Paid' status</p>
            </div>
        </div>
    </div>

<script>
    function checkPin() {
        if(document.getElementById('pinInput').value === '0707') {
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
        } else { alert("❌ ACCESS DENIED!"); document.getElementById('pinInput').value = ''; }
    }

    const firebaseConfig = {
      apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
      authDomain: "bhoot-bangla-41807.firebaseapp.com",
      databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
      projectId: "bhoot-bangla-41807",
      storageBucket: "bhoot-bangla-41807.firebasestorage.app",
      messagingSenderId: "1065037227059",
      appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ALARM LOGIC
    let alarmEnabled = false; let isAlarmRinging = false;
    const alertSound = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");
    alertSound.loop = true; let prevOrderCount = 0; let firstLoad = true;

    function toggleAlarm() {
        alarmEnabled = !alarmEnabled;
        const btn = document.getElementById('alarmToggle');
        if(alarmEnabled) {
            btn.innerText = "🔊 ALARM ACTIVE"; btn.style.color = "#4caf50"; btn.style.borderColor = "#4caf50";
            alertSound.play(); setTimeout(() => { if(!isAlarmRinging) stopSound(); }, 1000);
        } else {
            btn.innerText = "🔇 ALARM OFF"; btn.style.color = "#ff4444"; btn.style.borderColor = "#ff4444"; stopSound();
        }
    }
    function stopSound() { alertSound.pause(); alertSound.currentTime = 0; isAlarmRinging = false; }

    function showTab(id, e) {
        ['ordersTab','analyticsTab'].forEach(t => document.getElementById(t).style.display = 'none');
        document.getElementById(id).style.display = id==='ordersTab' ? 'grid' : 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        if(id === 'analyticsTab') loadAnalytics();
    }

    // THE PRO LISTENER (WITH CANCEL & CHECKBOX)
    db.ref('orders').on('value', snap => {
        const grid = document.getElementById('ordersTab');
        grid.innerHTML = '';
        const data = snap.val();
        let currentCount = data ? Object.keys(data).length : 0;

        if(!firstLoad && currentCount > prevOrderCount && alarmEnabled) {
            isAlarmRinging = true; alertSound.play();
            setTimeout(() => { stopSound(); }, 6000);
        }
        prevOrderCount = currentCount; firstLoad = false;

        if(!data) return grid.innerHTML = '<p style="color:#666; text-align:center; width:100%; margin-top:50px;">Waiting for spirits (No Orders)...</p>';

        for(let id in data) {
            const o = data[id];
            const isPaid = o.payment === "Paid";
            
            // Checkbox logic: Agar paid nahi hai aur amount >= 199 hai toh dikhao
            const canDiscount = o.totalAmount >= 199 && !isPaid;
            // Agar checkbox pehle se checked tha db me (optional) ya local logic use karein
            const currentTotal = o.discountedAmount || o.totalAmount; 
            const isDiscounted = o.discountedAmount ? true : false;

            grid.innerHTML += `
                <div class="card ${isPaid ? 'paid' : ''}">
                    <div class="card-header">
                        <div class="card-title">${o.table}</div>
                        <button class="cancel-btn" onclick="cancelOrder('${id}')">❌ CANCEL</button>
                    </div>
                    
                    <div style="font-size:11px; color:#888; margin-bottom:10px">Time: ${o.time}</div>
                    <div style="margin-bottom:15px; font-size:15px; color:#ddd; line-height:1.4">${o.items}</div>
                    
                    <div style="font-size:28px; font-weight:bold; margin-bottom:10px; color:#fff;">₹<span id="price-${id}">${currentTotal}</span></div>
                    
                    <div class="discount-bar" style="display: ${canDiscount || isDiscounted ? 'flex' : 'none'}; opacity: ${isPaid ? '0.5' : '1'}">
                        <input type="checkbox" class="discount-checkbox" id="check-${id}" ${isDiscounted ? 'checked' : ''} ${isPaid ? 'disabled' : ''} onchange="toggleDiscount('${id}', ${o.totalAmount}, this)">
                        <label for="check-${id}" class="discount-label">Apply 10% Dark Magic OFF</label>
                    </div>
                    
                    <div class="action-row">
                        <button class="btn-paid" onclick="markPaid('${id}')">${o.payment}</button>
                        <button class="btn-done" onclick="completeOrder('${id}', '${o.table}', '${o.items}')">DONE & WHATSAPP</button>
                    </div>
                </div>`;
        }
    });

    // Smart Checkbox Action (DB Update)
    function toggleDiscount(id, originalAmount, checkbox) {
        if(checkbox.checked) {
            const newTotal = Math.round(originalAmount * 0.9);
            db.ref('orders/' + id).update({ discountedAmount: newTotal });
        } else {
            db.ref('orders/' + id).update({ discountedAmount: null });
        }
    }

    function cancelOrder(id) {
        if(confirm("Bhai, pakka ye order CANCEL/DELETE karna hai?")) {
            db.ref('orders/' + id).remove();
        }
    }

    function markPaid(id) {
        db.ref('orders/' + id).update({ payment: 'Paid' });
    }

    // WHATSAPP BILLING (Gets the final price on the spot)
    function completeOrder(id, table, items) {
        db.ref('orders/' + id).once('value').then(s => {
            const data = s.val();
            if(data.payment !== "Paid") return alert("⚠️ Pehle Payment mark karo bhai!");
            
            // Checks if discounted amount exists, else takes normal total
            const finalAmount = data.discountedAmount || data.totalAmount;
            const discountText = data.discountedAmount ? "(10% OFF Applied)" : "";
            
            const num = prompt("Enter Customer WhatsApp Number:");
            if(!num) return;
            
            const msg = `☠️ *BHOOT BANGLA RECEIPT* ☠️\n\n` +
                        `*${table}*\n` +
                        `---------------------\n` +
                        `${items.replace(/, /g, '\n')}\n` +
                        `---------------------\n` +
                        `*TOTAL: ₹${finalAmount}* ${discountText}\n\n` +
                        `_Thank you for surviving with us!_`;
            
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
            db.ref('orders/' + id).remove();
        });
    }

    function loadAnalytics() {
        db.ref('analytics').once('value', s => {
            let total = 0;
            s.forEach(child => { total += child.val().amount || 0; });
            document.getElementById('totalRevenue').innerText = '₹' + total;
        });
    }
</script>
</body>
</html>
