<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhoot Bangla | Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        /* THE 10/10 PREMIUM UI OVERHAUL */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Outfit:wght@300;500;700&display=swap');

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        
        /* Deep Cinematic Background */
        body { 
            background: #020000; 
            background-image: radial-gradient(circle at 50% 0%, #1a0000 0%, #020000 70%);
            color: #e0e0e0; 
            font-family: 'Outfit', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }
        
        /* Frosted Glass Header */
        .header { 
            background: rgba(5, 0, 0, 0.6); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 40px; 
            border-bottom: 1px solid rgba(255, 26, 26, 0.15); 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 26px; letter-spacing: 3px; text-shadow: 0 0 20px rgba(255,26,26,0.3); }
        
        /* Neon Pulse Alarm Button */
        .alarm-btn { 
            background: rgba(255, 68, 68, 0.05); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.3); 
            padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px;
        }
        .alarm-btn:hover { background: rgba(255, 68, 68, 0.15); box-shadow: 0 0 15px rgba(255,68,68,0.2); }
        
        /* Modern Minimalist Tabs */
        .tabs { display: flex; background: rgba(0,0,0,0.5); justify-content: center; padding-top: 10px; }
        .tab-btn { 
            padding: 15px 40px; background: transparent; color: #666; border: none; 
            font-weight: 500; cursor: pointer; font-family: 'Outfit', sans-serif; font-size: 14px; 
            letter-spacing: 2px; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
        }
        .tab-btn::after {
            content: ''; position: absolute; bottom: 0; left: 50%; width: 0; height: 2px; 
            background: #ff1a1a; transition: all 0.3s ease; transform: translateX(-50%);
        }
        .tab-btn:hover { color: #aaa; }
        .tab-btn.active { color: #fff; }
        .tab-btn.active::after { width: 100%; box-shadow: 0 -2px 10px rgba(255,26,26,0.5); }
        
        .container { padding: 40px 30px; max-width: 1400px; margin: auto; }
        
        /* The "Zomato-Killer" Card Design */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .card { 
            background: linear-gradient(145deg, rgba(15,5,5,0.8) 0%, rgba(5,0,0,0.9) 100%);
            border: 1px solid rgba(255, 26, 26, 0.1); 
            padding: 25px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, #ff1a1a, #550000);
        }
        .card:hover { transform: translateY(-8px); border-color: rgba(255, 26, 26, 0.3); box-shadow: 0 15px 40px rgba(255,26,26,0.15); } 
        .card.paid::before { background: linear-gradient(to bottom, #00ff88, #005522); }
        .card.paid { border-color: rgba(0, 255, 136, 0.1); }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 15px; }
        .card-title { color: #fff; font-weight: 700; font-size: 20px; font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
        
        /* Subtle Cancel Button */
        .cancel-btn { background: transparent; border: 1px solid rgba(255,26,26,0.3); color: #ff4444; border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; letter-spacing: 1px;}
        .cancel-btn:hover { background: rgba(255,26,26,0.1); }
        
        /* Tactile Action Buttons */
        .action-row { display: flex; gap: 15px; margin-top: 20px; }
        .btn-paid { 
            flex: 1; background: rgba(0, 255, 136, 0.05); color: #00ff88; border: 1px solid rgba(0, 255, 136, 0.3); 
            padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; letter-spacing: 1px;
        }
        .btn-paid:hover { background: rgba(0, 255, 136, 0.15); box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .btn-done { 
            flex: 1; background: linear-gradient(135deg, #cc0000 0%, #880000 100%); color: #fff; border: none; 
            padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; letter-spacing: 1px;
        }
        .btn-done:hover { box-shadow: 0 5px 20px rgba(255,0,0,0.4); filter: brightness(1.2); }
        .btn-done:active { transform: scale(0.95); }

        /* Smooth Inputs & Forms */
        .filter-bar { background: rgba(10,5,5,0.6); backdrop-filter: blur(10px); padding: 20px 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .filter-bar input[type="date"] { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,26,26,0.3); padding: 12px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 15px; outline: none; transition: 0.3s; color-scheme: dark; }
        .filter-bar input[type="date"]:focus { border-color: #ff1a1a; box-shadow: 0 0 10px rgba(255,26,26,0.2); }
        
        /* Stats Dashboard Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .stat-box { 
            background: linear-gradient(145deg, rgba(20,5,5,0.4) 0%, rgba(5,0,0,0.6) 100%);
            padding: 35px 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); 
            text-align: center; position: relative; overflow: hidden;
        }
        .stat-box::after { content:''; position:absolute; top:0; left:0; width:100%; height:1px; background: linear-gradient(90deg, transparent, rgba(255,26,26,0.5), transparent); }
        
        .history-card { 
            background: rgba(10,5,5,0.6); border: 1px solid rgba(255,255,255,0.03); padding: 20px; 
            border-radius: 12px; transition: 0.3s; display: flex; flex-direction: column; gap: 8px;
        }
        .history-card:hover { background: rgba(20,5,5,0.8); border-color: rgba(255,26,26,0.2); transform: translateY(-3px); }

        /* Security Screen Enhancement */
        #pinScreen { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); }
        .pin-box { background: rgba(10,5,5,0.8); border: 1px solid rgba(255,26,26,0.3); border-radius: 20px; padding: 50px 40px; box-shadow: 0 20px 50px rgba(255,0,0,0.15); }
        .pin-box input { border: 2px solid rgba(255,26,26,0.2); border-radius: 12px; background: rgba(0,0,0,0.5); font-size: 32px; letter-spacing: 15px; transition: 0.3s; }
        .pin-box input:focus { border-color: #ff1a1a; box-shadow: 0 0 15px rgba(255,26,26,0.2); }
        .pin-box button { background: linear-gradient(90deg, #ff1a1a, #cc0000); border-radius: 10px; letter-spacing: 2px; }
        
    </style>
</head>
<body>
    <div id="pinScreen">
        <div class="pin-box">
            <h1 style="color:#ff1a1a; font-family:'Cinzel', serif;">ADMIN VAULT</h1>
            <p style="color:#666; font-size:13px; margin-top:5px; letter-spacing: 2px;">SECURE ACCESS ONLY</p>
            <input type="password" id="pinInput" placeholder="****" maxlength="4">
            <button type="button" onclick="checkPin()">UNLOCK SYSTEM</button>
        </div>
    </div>
    <div id="dashboard" style="display:none;">
        <div class="header">
            <h1>COMMAND CENTER</h1>
            <button id="alarmToggle" class="alarm-btn" onclick="toggleAlarm()">🔇 ALARM OFF</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('orderTab', event)">LIVE ORDERS</button>
            <button class="tab-btn" onclick="showTab('analyticsTab', event)">SALES LEDGER</button>
            <button class="tab-btn" onclick="showTab('inventoryTab', event)">MENU MANAGER</button>
        </div>
        <div id="orderTab" class="container">
            <div id="orderGrid" class="grid"></div>
        </div>
        <div id="analyticsTab" class="container" style="display:none;">
            <div class="filter-bar">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color:#aaa; font-weight:bold;">Filter by Date:</span>
                    <input type="date" id="dateFilter" onchange="loadAnalytics()">
                </div>
                <button class="clear-btn" onclick="clearFilter()">SHOW ALL-TIME</button>
            </div>
            <div class="stats-grid">
                <div class="stat-box">
                    <h3 style="color:#aaa; letter-spacing:1px; font-size:14px;">REVENUE</h3>
                    <h1 id="totalRevenue" style="color:#4caf50; font-size:42px; margin-top:15px; font-family:'Outfit', sans-serif;">₹0</h1>
                </div>
                <div class="stat-box">
                    <h3 style="color:#aaa; letter-spacing:1px; font-size:14px;">ORDERS COMPLETED</h3>
                    <h1 id="totalOrdersCount" style="color:#fff; font-size:42px; margin-top:15px; font-family:'Outfit', sans-serif;">0</h1>
                </div>
                <div class="stat-box" style="border-color: #ff1a1a;">
                    <h3 style="color:#ff1a1a; letter-spacing:1px; font-size:14px;">👑 WINNING PRODUCT</h3>
                    <h1 id="bestsellerItem" style="color:#ff1a1a; font-size:28px; margin-top:15px; font-family:'Outfit', sans-serif;">-</h1>
                </div>
            </div>
            <h3 style="color:#fff; font-family:'Cinzel', serif; margin-bottom:20px; border-bottom: 1px solid #333; padding-bottom:10px; font-size:22px;" id="ledgerTitle">Complete Order Record</h3>
            <div id="historyList" class="history-grid"></div>
        </div>
        <div id="inventoryTab" class="container" style="display:none;">
            <div class="inventory-wrapper">
                <div class="inventory-form">
                    <h3 style="color:#ff1a1a; margin-bottom:20px; font-family:'Cinzel', serif; font-size:20px;">Add New Item</h3>
                    <input type="text" id="iName" placeholder="Item Name (e.g. Ghost Burger)">
                    <input type="number" id="iPrice" placeholder="Price (e.g. 150)">
                    <input type="text" id="iCat" placeholder="Category (e.g. Burgers, Drinks)">
                    <button type="button" onclick="addMenuItem()">+ ADD TO MENU</button>
                </div>
                <div>
                    <h3 style="color:#fff; font-family:'Cinzel', serif; margin-bottom:20px; border-bottom: 1px solid #333; padding-bottom:10px; font-size:22px;">Live Menu Items</h3>
                    <div id="inventoryList"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
    function checkPin() {
        if(document.getElementById('pinInput').value === '0707') {
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('pinInput').blur(); 
        } else { 
            alert("❌ ACCESS DENIED"); 
            document.getElementById('pinInput').value = ''; 
        }
    }
    document.getElementById('pinInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPin();
    });

    const firebaseConfig = {
      apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
      authDomain: "bhoot-bangla-41807.firebaseapp.com",
      databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
      projectId: "bhoot-bangla-41807",
      storageBucket: "bhoot-bangla-41807.firebasestorage.app",
      messagingSenderId: "1065037227059",
      appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let globalOrders = {};
    let alarmEnabled = false; let isAlarmRinging = false;
    const alertSound = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");
    alertSound.loop = true; let prevOrderCount = 0; let firstLoad = true;

    function toggleAlarm() {
        alarmEnabled = !alarmEnabled;
        const btn = document.getElementById('alarmToggle');
        if(alarmEnabled) {
            btn.innerText = "🔊 ALARM ACTIVE"; btn.style.color = "#4caf50"; btn.style.borderColor = "#4caf50";
            alertSound.play(); setTimeout(() => { if(!isAlarmRinging) stopSound(); }, 6000);
        } else {
            btn.innerText = "🔇 ALARM OFF"; btn.style.color = "#ff4444"; btn.style.borderColor = "#ff4444"; stopSound();
        }
    }
    function stopSound() { alertSound.pause(); alertSound.currentTime = 0; isAlarmRinging = false; }

    function showTab(id, e) {
        ['orderTab', 'analyticsTab', 'inventoryTab'].forEach(t => document.getElementById(t).style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        if(id === 'analyticsTab') loadAnalytics();
        if(id === 'inventoryTab') loadInventory();
    }

    db.ref('orders').on('value', snap => {
        const grid = document.getElementById('orderGrid');
        grid.innerHTML = '';
        const data = snap.val();
        globalOrders = data || {}; 
        let currentCount = data ? Object.keys(data).length : 0;
        if(!firstLoad && currentCount > prevOrderCount && alarmEnabled) {
            isAlarmRinging = true; alertSound.play(); setTimeout(() => { stopSound(); }, 6000);
        }
        prevOrderCount = currentCount; firstLoad = false;
        if(!data) return grid.innerHTML = '<p style="color:#666; font-size:18px; text-align:center; width:100%; margin-top:50px;">The realm is quiet... waiting for orders.</p>';

        for(let id in data) {
            const o = data[id];
            const isPaid = o.payment === "Paid";
            const displayTotal = o.discountedAmount || o.totalAmount;
            const isDiscounted = o.discountedAmount ? true : false;
            const showCheckbox = (!isPaid && o.totalAmount >= 199) || isDiscounted;

            grid.innerHTML += `
                <div class="card ${isPaid ? 'paid' : ''}">
                    <div class="card-header">
                        <div class="card-title">${o.table}</div>
                        <button class="cancel-btn" onclick="cancelOrder('${id}')">❌ CANCEL</button>
                    </div>
                    <div style="font-size:12px; color:#888; margin-bottom:12px; font-weight:bold;">🕒 ${o.time}</div>
                    <div style="margin-bottom:18px; font-size:15px; color:#ddd; line-height:1.5;">${o.items}</div>
                    <div style="font-size:28px; font-weight:bold; color:#fff; margin-bottom:15px;">₹${displayTotal}</div>
                    
                    <div class="discount-box" style="display: ${showCheckbox ? 'flex' : 'none'}; opacity: ${isPaid ? '0.5' : '1'}">
                        <input type="checkbox" id="chk-${id}" ${isDiscounted ? 'checked' : ''} ${isPaid ? 'disabled' : ''} onchange="toggleDiscount('${id}', this)">
                        <label for="chk-${id}">Apply 10% OFF Magic</label>
                    </div>
                    
                    <div class="action-row">
                        <button type="button" class="btn-paid" onclick="markPaid('${id}')">${o.payment}</button>
                        <button type="button" class="btn-done" onclick="completeOrder('${id}')">SEND BILL</button>
                    </div>
                </div>`;
        }
    });

    function toggleDiscount(id, checkbox) {
        const o = globalOrders[id];
        if(!o) return;
        const newTotal = checkbox.checked ? Math.round(o.totalAmount * 0.9) : null;
        db.ref('orders/' + id).update({ discountedAmount: newTotal });
    }

    function cancelOrder(id) { if(confirm("Are you sure you want to delete this live order?")) db.ref('orders/' + id).remove(); }
    function markPaid(id) { db.ref('orders/' + id).update({ payment: 'Paid' }); }

    function completeOrder(id) {
        const o = globalOrders[id];
        if(!o) return;
        if(o.payment !== "Paid") return alert("⚠️ Payment must be marked 'Paid' first!");
        
        const finalAmount = o.discountedAmount || o.totalAmount;

        db.ref('analytics').push({
            table: o.table, items: o.items, amount: parseInt(finalAmount), time: o.time, timestamp: Date.now()
        });

        const num = prompt("Enter WhatsApp Number for Bill (10 Digits):");
        if(num) {
            const safeItems = (o.items || '').replace(/, /g, '\n');
            const msg = `☠️ *BHOOT BANGLA RECEIPT* ☠️\n\n*${o.table}*\n---------------------\n${safeItems}\n---------------------\n*TOTAL: ₹${finalAmount}*\n\n_Thank you for surviving with us!_`;
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        db.ref('orders/' + id).remove();
    }

    function clearFilter() {
        document.getElementById('dateFilter').value = '';
        loadAnalytics();
    }

    function loadAnalytics() {
        db.ref('analytics').once('value', s => {
            const data = s.val();
            let totalAmount = 0; let totalOrders = 0; let html = ''; let itemCounts = {};
            const selectedDate = document.getElementById('dateFilter').value;
            
            if(data) {
                const records = Object.values(data).sort((a,b) => b.timestamp - a.timestamp);
                
                records.forEach(r => {
                    let recordDate = "";
                    if(r.timestamp) {
                        const d = new Date(r.timestamp);
                        recordDate = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
                    }
                    if(selectedDate && recordDate !== selectedDate) return; 

                    totalAmount += r.amount || 0;
                    totalOrders++;

                    if(r.items) {
                        const parts = r.items.split(', ');
                        parts.forEach(p => {
                            const match = p.match(/(.*) x(\d+)/);
                            if(match) {
                                const itemName = match[1];
                                const qty = parseInt(match[2]);
                                itemCounts[itemName] = (itemCounts[itemName] || 0) + qty;
                            }
                        });
                    }

                    html += `
                        <div class="history-card">
                            <div style="display:flex; justify-content:space-between; color:#888; font-size:12px; margin-bottom:8px; border-bottom:1px solid #222; padding-bottom:5px;">
                                <span>📅 ${recordDate} | 🕒 ${r.time || 'Unknown'}</span>
                                <span style="color:#fff; font-weight:bold; font-family:'Cinzel', serif;">${r.table || 'Unknown'}</span>
                            </div>
                            <div style="color:#ccc; font-size:14px; margin-bottom:12px; line-height:1.4;">${r.items || 'No items saved'}</div>
                            <div style="color:#4caf50; font-weight:bold; font-size:22px;">₹${r.amount || 0}</div>
                        </div>`;
                });

                let bestItem = "-"; let maxQty = 0;
                for(let item in itemCounts) {
                    if(itemCounts[item] > maxQty) {
                        maxQty = itemCounts[item];
                        bestItem = item + "<br><span style='font-size:16px; color:#aaa'>(" + maxQty + " Sold)</span>";
                    }
                }
                document.getElementById('bestsellerItem').innerHTML = bestItem;
            }
            
            if(!html) {
                html = '<p style="color:#666; text-align:center; grid-column: 1 / -1; font-size: 18px; margin-top:30px;">No sales found for this period.</p>';
                document.getElementById('bestsellerItem').innerHTML = "-";
            }
            
            document.getElementById('totalRevenue').innerText = '₹' + totalAmount;
            document.getElementById('totalOrdersCount').innerText = totalOrders;
            document.getElementById('historyList').innerHTML = html;
            document.getElementById('ledgerTitle').innerText = selectedDate ? `Order Record for ${selectedDate}` : "Complete Order Record (All Time)";
        });
    }

    function addMenuItem() {
        const name = document.getElementById('iName').value.trim();
        const price = document.getElementById('iPrice').value.trim();
        const cat = document.getElementById('iCat').value.trim();
        if(!name || !price || !cat) return alert("Please fill all fields!");
        db.ref('menu_items').push({ name: name, price: price, cat: cat }).then(() => {
            document.getElementById('iName').value = ''; document.getElementById('iPrice').value = ''; document.getElementById('iCat').value = '';
            loadInventory();
        });
    }

    function loadInventory() {
        db.ref('menu_items').once('value', s => {
            let html = '';
            s.forEach(child => {
                const item = child.val();
                html += `
                    <div class="inventory-item">
                        <div>
                            <div style="color:#fff; font-weight:bold; font-size:16px;">${item.name}</div>
                            <div style="color:#aaa; font-size:13px; margin-top:5px;"><span style="color:#4caf50; font-weight:bold;">₹${item.price}</span> &nbsp;|&nbsp; ${item.cat}</div>
                        </div>
                        <button type="button" onclick="removeMenuItem('${child.key}')" style="background:transparent; border:1px solid #ff4444; color:#ff4444; padding:8px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px; transition:0.2s;" onmouseover="this.style.background='#ff4444'; this.style.color='#000';" onmouseout="this.style.background='transparent'; this.style.color='#ff4444';">DELETE</button>
                    </div>`;
            });
            document.getElementById('inventoryList').innerHTML = html || '<p style="color:#666;">No items in the menu.</p>';
        });
    }

    function removeMenuItem(key) {
        if(confirm("Are you sure you want to remove this item from the live menu?")) {
            db.ref('menu_items/' + key).remove().then(() => loadInventory());
        }
    }
</script>
</body>
</html>
