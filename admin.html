    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoot Bangla | Master Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #050000; color: #e0e0e0; font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        
        .header { background: #0a0a0a; padding: 20px 40px; border-bottom: 1px solid #300; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 24px; letter-spacing: 2px; }
        .alarm-btn { background: #111; color: #ff4444; border: 1px solid #ff4444; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .alarm-btn:hover { background: rgba(255, 68, 68, 0.1); }
        
        .tabs { display: flex; background: #0a0a0a; border-bottom: 1px solid #222; justify-content: center; }
        .tab-btn { padding: 18px 40px; background: transparent; color: #888; border: none; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; font-size: 16px; transition: 0.3s; }
        .tab-btn:hover { color: #fff; }
        .tab-btn.active { color: #ff1a1a; border-bottom: 3px solid #ff1a1a; background: rgba(255,0,0,0.05); }
        
        .container { padding: 30px; max-width: 1400px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        
        .card { background: #0d0505; border: 1px solid #300; padding: 20px; border-radius: 12px; border-left: 4px solid #ff1a1a; transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,26,26,0.15); } 
        .card.paid { border-left-color: #4caf50; opacity: 0.85; }
        .card-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 10px; }
        .card-title { color: #ff1a1a; font-weight: bold; font-size: 22px; font-family: 'Cinzel', serif; }
        .cancel-btn { background: rgba(255,0,0,0.1); border: 1px solid #ff1a1a; color: #ff1a1a; border-radius: 4px; padding: 5px 10px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cancel-btn:hover { background: #ff1a1a; color: #000; }
        
        .discount-box { display: flex; align-items: center; gap: 10px; background: #111; padding: 12px; border-radius: 6px; margin-bottom: 15px; border: 1px dashed #444; }
        .discount-box input { width: 18px; height: 18px; accent-color: #ff1a1a; cursor: pointer; }
        .discount-box label { font-size: 14px; color: #aaa; cursor: pointer; }
        
        .action-row { display: flex; gap: 10px; }
        .btn-paid { flex: 1; background: #0e2412; color: #4caf50; border: 1px solid #4caf50; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-paid:hover { background: #4caf50; color: #000; }
        .btn-done { flex: 1; background: #330000; color: #ff4444; border: 1px solid #ff4444; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-done:hover { background: #ff4444; color: #fff; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: #0a0a0a; padding: 25px; border-radius: 12px; border: 1px solid #333; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .history-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .history-card { background: #0a0a0a; border: 1px solid #222; padding: 18px; border-radius: 8px; border-left: 3px solid #4caf50; transition: 0.2s; }
        .history-card:hover { border-color: #444; background: #111; transform: translateY(-2px); }

        .filter-bar { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .filter-bar input[type="date"] { background: #000; color: #fff; border: 1px solid #555; padding: 10px; border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: 15px; outline: none; }
        .filter-bar input[type="date"]:focus { border-color: #ff1a1a; }
        .clear-btn { background: transparent; border: 1px solid #ff4444; color: #ff4444; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .clear-btn:hover { background: #ff4444; color: #000; }

        .inventory-wrapper { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; align-items: start; }
        @media (max-width: 768px) { .inventory-wrapper { grid-template-columns: 1fr; } .tabs { flex-wrap: wrap; } .tab-btn { flex: 1 1 100%; padding: 12px; } .filter-bar { flex-direction: column; gap: 10px; align-items: stretch; } }
        
        .inventory-form { background: #0a0a0a; padding: 25px; border-radius: 10px; border: 1px solid #ff1a1a; position: sticky; top: 20px; }
        .inventory-form input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #444; color: #fff; border-radius: 6px; font-size: 15px; outline: none; }
        .inventory-form input:focus { border-color: #ff1a1a; }
        .inventory-form button { width: 100%; background: #ff1a1a; color: #000; padding: 15px; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .inventory-form button:hover { background: #cc0000; color: #fff; }
        .inventory-item { display: flex; justify-content: space-between; background: #0a0a0a; padding: 18px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #222; align-items: center; transition: 0.2s; }
        .inventory-item:hover { border-color: #555; }

        #pinScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .pin-box { background: #0a0a0a; padding: 40px; border-radius: 12px; border: 1px solid #f00; text-align: center; box-shadow: 0 0 40px rgba(255,0,0,0.2); width: 90%; max-width: 400px; }
        .pin-box input { background: transparent; border: 2px solid #300; color: #fff; padding: 15px; font-size: 28px; text-align: center; width: 100%; margin: 20px 0; border-radius: 6px; letter-spacing: 10px; font-family: 'Cinzel', serif; outline: none; }
        .pin-box button { background: #ff1a1a; color: #000; border: none; padding: 16px; font-weight: bold; width: 100%; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div id="pinScreen">
        <div class="pin-box">
            <h1 style="color:#ff1a1a; font-family:'Cinzel', serif;">ADMIN VAULT</h1>
            <p style="color:#666; font-size:13px; margin-top:5px; letter-spacing: 2px;">SECURE ACCESS ONLY</p>
            <input type="password" id="pinInput" placeholder="****" maxlength="4">
            <button onclick="checkPin()">UNLOCK SYSTEM</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <div class="header">
            <h1>COMMAND CENTER</h1>
            <button id="alarmToggle" class="alarm-btn" onclick="toggleAlarm()">🔇 ALARM OFF</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('orderTab', event)">LIVE ORDERS</button>
            <button class="tab-btn" onclick="showTab('analyticsTab', event)">SALES LEDGER</button>
            <button class="tab-btn" onclick="showTab('inventoryTab', event)">MENU MANAGER</button>
        </div>

        <div id="orderTab" class="container">
            <div id="orderGrid" class="grid"></div>
        </div>
        
        <div id="analyticsTab" class="container" style="display:none;">
            <div class="filter-bar">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color:#aaa; font-weight:bold;">Filter by Date:</span>
                    <input type="date" id="dateFilter" onchange="loadAnalytics()">
                </div>
                <button class="clear-btn" onclick="clearFilter()">SHOW ALL-TIME</button>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <h3 style="color:#aaa; letter-spacing:1px; font-size:14px;">REVENUE</h3>
                    <h1 id="totalRevenue" style="color:#4caf50; font-size:42px; margin-top:15px; font-family:'Outfit', sans-serif;">₹0</h1>
                </div>
                <div class="stat-box">
                    <h3 style="color:#aaa; letter-spacing:1px; font-size:14px;">ORDERS COMPLETED</h3>
                    <h1 id="totalOrdersCount" style="color:#fff; font-size:42px; margin-top:15px; font-family:'Outfit', sans-serif;">0</h1>
                </div>
                <div class="stat-box" style="border-color: #ff1a1a;">
                    <h3 style="color:#ff1a1a; letter-spacing:1px; font-size:14px;">👑 WINNING PRODUCT</h3>
                    <h1 id="bestsellerItem" style="color:#ff1a1a; font-size:28px; margin-top:15px; font-family:'Outfit', sans-serif;">-</h1>
                </div>
            </div>
            
            <h3 style="color:#fff; font-family:'Cinzel', serif; margin-bottom:20px; border-bottom: 1px solid #333; padding-bottom:10px; font-size:22px;" id="ledgerTitle">Complete Order Record</h3>
            <div id="historyList" class="history-grid"></div>
        </div>

        <div id="inventoryTab" class="container" style="display:none;">
            <div class="inventory-wrapper">
                <div class="inventory-form">
                    <h3 style="color:#ff1a1a; margin-bottom:20px; font-family:'Cinzel', serif; font-size:20px;">Add New Item</h3>
                    <input type="text" id="iName" placeholder="Item Name (e.g. Ghost Burger)">
                    <input type="number" id="iPrice" placeholder="Price (e.g. 150)">
                    <input type="text" id="iCat" placeholder="Category (e.g. Burgers, Drinks)">
                    <button onclick="addMenuItem()">+ ADD TO MENU</button>
                </div>
                <div>
                    <h3 style="color:#fff; font-family:'Cinzel', serif; margin-bottom:20px; border-bottom: 1px solid #333; padding-bottom:10px; font-size:22px;">Live Menu Items</h3>
                    <div id="inventoryList"></div>
                </div>
            </div>
        </div>
    </div>

<script>
    function checkPin() {
        if(document.getElementById('pinInput').value === '0707') {
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        } else { alert("❌ ACCESS DENIED"); document.getElementById('pinInput').value = ''; }
    }

    const firebaseConfig = {
      apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
      authDomain: "bhoot-bangla-41807.firebaseapp.com",
      databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
      projectId: "bhoot-bangla-41807",
      storageBucket: "bhoot-bangla-41807.firebasestorage.app",
      messagingSenderId: "1065037227059",
      appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Global memory to prevent HTML string crash issues
    let globalOrders = {};

    let alarmEnabled = false; let isAlarmRinging = false;
    const alertSound = new Audio("https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg");
    alertSound.loop = true; let prevOrderCount = 0; let firstLoad = true;

    function toggleAlarm() {
        alarmEnabled = !alarmEnabled;
        const btn = document.getElementById('alarmToggle');
        if(alarmEnabled) {
            btn.innerText = "🔊 ALARM ACTIVE"; btn.style.color = "#4caf50"; btn.style.borderColor = "#4caf50";
            alertSound.play(); setTimeout(() => { if(!isAlarmRinging) stopSound(); }, 6000);
        } else {
            btn.innerText = "🔇 ALARM OFF"; btn.style.color = "#ff4444"; btn.style.borderColor = "#ff4444"; stopSound();
        }
    }
    function stopSound() { alertSound.pause(); alertSound.currentTime = 0; isAlarmRinging = false; }

    function showTab(id, e) {
        ['orderTab', 'analyticsTab', 'inventoryTab'].forEach(t => document.getElementById(t).style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        if(id === 'analyticsTab') loadAnalytics();
        if(id === 'inventoryTab') loadInventory();
    }

    db.ref('orders').on('value', snap => {
        const grid = document.getElementById('orderGrid');
        grid.innerHTML = '';
        const data = snap.val();
        globalOrders = data || {}; 
        let currentCount = data ? Object.keys(data).length : 0;

        if(!firstLoad && currentCount > prevOrderCount && alarmEnabled) {
            isAlarmRinging = true; alertSound.play(); setTimeout(() => { stopSound(); }, 6000);
        }
        prevOrderCount = currentCount; firstLoad = false;

        if(!data) return grid.innerHTML = '<p style="color:#666; font-size:18px; text-align:center; width:100%; margin-top:50px;">The realm is quiet... waiting for orders.</p>';

        for(let id in data) {
            const o = data[id];
            const isPaid = o.payment === "Paid";
            const displayTotal = o.discountedAmount || o.totalAmount;
            const isDiscounted = o.discountedAmount ? true : false;
            const showCheckbox = (!isPaid && o.totalAmount >= 199) || isDiscounted;

            grid.innerHTML += `
                <div class="card ${isPaid ? 'paid' : ''}">
                    <div class="card-header">
                        <div class="card-title">${o.table}</div>
                        <button class="cancel-btn" onclick="cancelOrder('${id}')">❌ CANCEL</button>
                    </div>
                    <div style="font-size:12px; color:#888; margin-bottom:12px; font-weight:bold;">🕒 ${o.time}</div>
                    <div style="margin-bottom:18px; font-size:15px; color:#ddd; line-height:1.5;">${o.items}</div>
                    <div style="font-size:28px; font-weight:bold; color:#fff; margin-bottom:15px;">₹${displayTotal}</div>
                    
                    <div class="discount-box" style="display: ${showCheckbox ? 'flex' : 'none'}; opacity: ${isPaid ? '0.5' : '1'}">
                        <input type="checkbox" id="chk-${id}" ${isDiscounted ? 'checked' : ''} ${isPaid ? 'disabled' : ''} onchange="toggleDiscount('${id}', this)">
                        <label for="chk-${id}">Apply 10% OFF Magic</label>
                    </div>
                    
                    <div class="action-row">
                        <button class="btn-paid" onclick="markPaid('${id}')">${o.payment}</button>
                        <button class="btn-done" onclick="completeOrder('${id}')">SEND BILL</button>
                    </div>
                </div>`;
        }
    });

    function toggleDiscount(id, checkbox) {
        const o = globalOrders[id];
        if(!o) return;
        const newTotal = checkbox.checked ? Math.round(o.totalAmount * 0.9) : null;
        db.ref('orders/' + id).update({ discountedAmount: newTotal });
    }

    function cancelOrder(id) { if(confirm("Are you sure you want to delete this live order?")) db.ref('orders/' + id).remove(); }
    function markPaid(id) { db.ref('orders/' + id).update({ payment: 'Paid' }); }

    function completeOrder(id) {
        const o = globalOrders[id];
        if(!o) return;
        if(o.payment !== "Paid") return alert("⚠️ Payment must be marked 'Paid' first!");
        
        const finalAmount = o.discountedAmount || o.totalAmount;

        db.ref('analytics').push({
            table: o.table,
            items: o.items,
            amount: parseInt(finalAmount),
            time: o.time,
            timestamp: Date.now()
        });

        const num = prompt("Enter WhatsApp Number for Bill (10 Digits):");
        if(num) {
            const safeItems = (o.items || '').replace(/, /g, '\n');
            const msg = `☠️ *BHOOT BANGLA RECEIPT* ☠️\n\n*${o.table}*\n---------------------\n${safeItems}\n---------------------\n*TOTAL: ₹${finalAmount}*\n\n_Thank you for surviving with us!_`;
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        db.ref('orders/' + id).remove();
    }

    // -- ANALYTICS & LEDGER --
    function clearFilter() {
        document.getElementById('dateFilter').value = '';
        loadAnalytics();
    }

    function loadAnalytics() {
        db.ref('analytics').once('value', s => {
            const data = s.val();
            let totalAmount = 0; let totalOrders = 0; let html = ''; let itemCounts = {};
            const selectedDate = document.getElementById('dateFilter').value;
            
            if(data) {
                const records = Object.values(data).sort((a,b) => b.timestamp - a.timestamp);
                
                records.forEach(r => {
                    let recordDate = "";
                    if(r.timestamp) {
                        const d = new Date(r.timestamp);
                        recordDate = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
                    }
                    if(selectedDate && recordDate !== selectedDate) return; 

                    totalAmount += r.amount || 0;
                    totalOrders++;

                    if(r.items) {
                        const parts = r.items.split(', ');
                        parts.forEach(p => {
                            const match = p.match(/(.*) x(\d+)/);
                            if(match) {
                                const itemName = match[1];
                                const qty = parseInt(match[2]);
                                itemCounts[itemName] = (itemCounts[itemName] || 0) + qty;
                            }
                        });
                    }

                    html += `
                        <div class="history-card">
                            <div style="display:flex; justify-content:space-between; color:#888; font-size:12px; margin-bottom:8px; border-bottom:1px solid #222; padding-bottom:5px;">
                                <span>📅 ${recordDate} | 🕒 ${r.time || 'Unknown'}</span>
                                <span style="color:#fff; font-weight:bold; font-family:'Cinzel', serif;">${r.table || 'Unknown'}</span>
                            </div>
                            <div style="color:#ccc; font-size:14px; margin-bottom:12px; line-height:1.4;">${r.items || 'No items saved'}</div>
                            <div style="color:#4caf50; font-weight:bold; font-size:22px;">₹${r.amount || 0}</div>
                        </div>`;
                });

                let bestItem = "-"; let maxQty = 0;
                for(let item in itemCounts) {
                    if(itemCounts[item] > maxQty) {
                        maxQty = itemCounts[item];
                        bestItem = item + "<br><span style='font-size:16px; color:#aaa'>(" + maxQty + " Sold)</span>";
