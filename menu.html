<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhoot Bangla | Digital Menu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #030000; color: #e0e0e0; font-family: 'Outfit', sans-serif; padding-bottom: 120px; overflow-x: hidden; }
        
        /* Premium Header */
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #110000 0%, #000 100%); border-bottom: 1px solid rgba(255,26,26,0.3); }
        .header h1 { font-family: 'Cinzel', serif; color: #ff1a1a; letter-spacing: 5px; font-size: 32px; text-shadow: 0 0 15px rgba(255,0,0,0.4); }
        .header p { font-size:10px; color:#888; letter-spacing: 3px; margin-top: 5px; }

        /* Menu Display */
        .cat-section { margin-top: 30px; padding: 0 15px; }
        .cat-title { font-family: 'Cinzel', serif; color: #ff3333; font-size: 18px; border-bottom: 1px solid #400; padding-bottom: 8px; margin-bottom: 15px; letter-spacing: 2px; }
        
        .menu-item { background: #0a0a0a; border: 1px solid #200; padding: 18px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 4px solid #ff1a1a; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .item-info h3 { font-size: 17px; color: #fff; margin-bottom: 4px; }
        .item-info p { color: #ff1a1a; font-weight: bold; }
        .add-btn { background: transparent; color: #ff1a1a; border: 1px solid #800; padding: 8px 18px; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .add-btn:active { background: #ff1a1a; color: #000; transform: scale(0.9); }

        /* ZOMATO STYLE FLOATING BAR */
        .cart-trigger { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #ff1a1a; color: #000; border-radius: 12px; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 5px 20px rgba(255,0,0,0.4); cursor: pointer; font-family: 'Cinzel', serif; font-weight: bold; }
        
        /* BOTTOM SLIDE DRAWER */
        .cart-drawer { position: fixed; bottom: 0; left: 0; width: 100%; max-height: 80vh; background: rgba(8,0,0,0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top-left-radius: 20px; border-top-right-radius: 20px; border-top: 2px solid #ff1a1a; z-index: 2000; padding: 25px 20px; transform: translateY(100%); transition: transform 0.3s ease-out; display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        .cart-drawer.active { transform: translateY(0); }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .drawer-header h2 { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 20px; }
        .close-btn { background: none; border: none; color: #888; font-size: 28px; padding: 0 10px; cursor: pointer; }

        .cart-items-list { overflow-y: auto; flex-grow: 1; margin-bottom: 15px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 12px; }
        .qty-controls { display: flex; align-items: center; gap: 12px; background: #111; border-radius: 20px; border: 1px solid #333; padding: 2px 5px; }
        .qty-btn { background: transparent; color: #ff1a1a; border: none; font-size: 20px; width: 30px; height: 30px; display: flex; justify-content: center; align-items: center; }
        
        .table-badge { background: #ff1a1a; color: #000; padding: 5px 12px; border-radius: 6px; font-family: 'Cinzel', serif; font-size: 13px; font-weight: bold; white-space: nowrap; }
        
        .summon-btn { width: 100%; background: #ff1a1a; color: #000; border: none; padding: 16px; border-radius: 8px; font-family: 'Cinzel', serif; font-weight: bold; font-size: 16px; margin-top: 15px; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; display: none; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BHOOT BANGLA</h1>
        <p>DIGITAL SUMMONING</p>
    </div>

    <div id="menuContent"></div>

    <div class="cart-trigger" id="cartTrigger" style="display:none" onclick="toggleDrawer(true)">
        <span>VIEW FEAST 🛒</span>
        <span>₹<span id="triggerTotal">0</span></span>
    </div>

    <div class="overlay" id="overlay" onclick="toggleDrawer(false)"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="drawer-header">
            <h2>YOUR ORDER</h2>
            <button class="close-btn" onclick="toggleDrawer(false)">&times;</button>
        </div>
        
        <div class="cart-items-list" id="cartItemsList"></div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #333; padding-top:15px;">
            <div id="tableDisplay" class="table-badge"></div>
            <div style="font-size:24px; font-weight:bold; color:#fff;">₹<span id="drawerTotal">0</span></div>
        </div>
        <button class="summon-btn" id="summonBtn" onclick="summonOrder()">SUMMON THE FEAST</button>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
      authDomain: "bhoot-bangla-41807.firebaseapp.com",
      databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
      projectId: "bhoot-bangla-41807",
      storageBucket: "bhoot-bangla-41807.firebasestorage.app",
      messagingSenderId: "1065037227059",
      appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const table = new URLSearchParams(window.location.search).get('table');
    document.getElementById('tableDisplay').innerText = table ? "TABLE " + table : "SCAN QR";

    let cartTotal = 0; let cartItems = {}; let itemPrices = {};

    db.ref('menu_items').on('value', snap => {
        const content = document.getElementById('menuContent');
        const data = snap.val();
        content.innerHTML = '';
        if(!data) return;

        const categories = {};
        for(let id in data) {
            const cat = data[id].cat || "Other";
            if(!categories[cat]) categories[cat] = [];
            categories[cat].push(data[id]);
            itemPrices[data[id].name] = parseInt(data[id].price);
        }

        for(let catName in categories) {
            let section = `<div class="cat-section"><h2 class="cat-title">${catName}</h2>`;
            categories[catName].forEach(item => {
                section += `<div class="menu-item"><div class="item-info"><h3>${item.name}</h3><p>₹${item.price}</p></div><button class="add-btn" onclick="addToCart('${item.name}')">ADD</button></div>`;
            });
            section += `</div>`;
            content.innerHTML += section;
        }
    });

    function toggleDrawer(show) {
        document.getElementById('cartDrawer').classList.toggle('active', show);
        document.getElementById('overlay').classList.toggle('active', show);
        if(!show && cartTotal === 0) document.getElementById('cartTrigger').style.display = 'none';
    }

    function updateCartUI() {
        const list = document.getElementById('cartItemsList');
        list.innerHTML = ''; cartTotal = 0; let hasItems = false;

        for(let name in cartItems) {
            if(cartItems[name] > 0) {
                hasItems = true;
                const price = itemPrices[name] * cartItems[name];
                cartTotal += price;
                list.innerHTML += `
                    <div class="cart-row">
                        <span style="color:#eee; font-size:15px; width:50%;">${name}</span>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${name}', -1)">-</button>
                            <span style="color:#fff; font-weight:bold; min-width:15px; text-align:center;">${cartItems[name]}</span>
                            <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
                        </div>
                        <span style="color:#fff; font-weight:bold;">₹${price}</span>
                    </div>`;
            }
        }
        document.getElementById('triggerTotal').innerText = cartTotal;
        document.getElementById('drawerTotal').innerText = cartTotal;
        
        if(hasItems) { document.getElementById('cartTrigger').style.display = 'flex'; } 
        else { toggleDrawer(false); document.getElementById('cartTrigger').style.display = 'none'; }
    }

    function addToCart(n) {
        cartItems[n] = (cartItems[n] || 0) + 1;
        if(navigator.vibrate) navigator.vibrate(40);
        updateCartUI();
    }

    function changeQty(n, delta) {
        cartItems[n] += delta;
        if(cartItems[n] <= 0) delete cartItems[n];
        if(navigator.vibrate) navigator.vibrate(20);
        updateCartUI();
    }

    function summonOrder() {
        if(!table) return alert("Pehle Table QR scan karo!");
        document.getElementById('summonBtn').innerText = "SENDING...";
        
        let formattedItems = Object.keys(cartItems).map(key => `${key} x${cartItems[key]}`).join(", ");

        db.ref('orders').push({
            table: "Table " + table, items: formattedItems, totalAmount: cartTotal, 
            time: new Date().toLocaleTimeString(), payment: 'Unpaid'
        }).then(() => { 
            if(navigator.vibrate) navigator.vibrate([100,50,100]);
            alert("☠️ ORDER CONFIRMED!"); location.reload(); 
        });
    }
</script>
</body>
</html>
