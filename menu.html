<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhoot Bangla | Digital Menu</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: #030000; color: #e0e0e0; font-family: 'Outfit', sans-serif; padding-bottom: 140px; }
        
        /* Premium Header */
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(180deg, #110000 0%, #000 100%); border-bottom: 1px solid #200; }
        .header h1 { font-family: 'Cinzel', serif; color: #ff1a1a; letter-spacing: 5px; font-size: clamp(28px, 8vw, 38px); text-shadow: 0 0 15px rgba(255,0,0,0.4); }
        
        /* Category Sections */
        .cat-section { margin-top: 30px; padding: 0 20px; }
        .cat-title { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 18px; border-bottom: 1px solid #400; padding-bottom: 8px; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Menu Items */
        .menu-item { background: #0a0a0a; border: 1px solid #1a0505; padding: 18px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-left: 4px solid #ff1a1a; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .item-info h3 { font-size: clamp(16px, 4vw, 19px); margin-bottom: 4px; color: #fff; }
        .item-info p { color: #ff1a1a; font-weight: bold; font-size: 17px; }
        .item-desc { color: #666; font-size: 12px; margin-top: 5px; line-height: 1.3; }
        
        .add-btn { background: transparent; color: #ff1a1a; border: 1px solid #800; padding: 10px 18px; border-radius: 6px; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .add-btn:active { background: #ff1a1a; color: #000; transform: scale(0.9); }
        
        /* FIXED CART BAR - No More Cutting! */
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: rgba(8,0,0,0.98); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px; border-top: 2px solid #ff1a1a; z-index: 1000; box-shadow: 0 -10px 30px rgba(0,0,0,0.8); }
        .cart-header { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 10px; }
        
        .total-text { font-weight: 600; color: #888; font-size: 13px; letter-spacing: 1px; white-space: nowrap; }
        .total-amt { font-size: 24px; color: #fff; font-weight: bold; display: block; }
        
        /* The Dynamic Table Badge Fix */
        .table-badge { 
            background: linear-gradient(145deg, #ff1a1a, #800); 
            color: #fff; 
            padding: 6px 14px; 
            border-radius: 8px; 
            font-family: 'Cinzel', serif; 
            font-size: 12px; 
            font-weight: bold; 
            white-space: nowrap; 
            flex-shrink: 0; /* Prevents text from squashing */
            box-shadow: 0 4px 10px rgba(255,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .summon-btn { width: 100%; background: #ff1a1a; color: #000; border: none; padding: 16px; border-radius: 8px; font-family: 'Cinzel', serif; font-weight: 900; font-size: 17px; margin-top: 15px; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255, 26, 26, 0.4); }
        .summon-btn:active { transform: scale(0.98); background: #cc0000; }

        /* Smooth Animations */
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .cart-bar { animation: slideUp 0.4s ease-out; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BHOOT BANGLA</h1>
        <p style="font-size:10px; color:#555; letter-spacing: 3px; margin-top: 5px;">A CULINARY NIGHTMARE</p>
    </div>

    <div id="menuContent">
        <p style="text-align:center; padding:50px; color:#444;">Summoning Menu...</p>
    </div>

    <div class="cart-bar" id="cart" style="display:none">
        <div class="cart-header">
            <div>
                <span class="total-text">SUMMONING TOTAL</span>
                <span class="total-amt">₹<span id="totalAmt">0</span></span>
            </div>
            <div id="tableDisplay" class="table-badge"></div>
        </div>
        <button class="summon-btn" onclick="summonOrder()">SUMMON THE FEAST</button>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
      authDomain: "bhoot-bangla-41807.firebaseapp.com",
      databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
      projectId: "bhoot-bangla-41807",
      storageBucket: "bhoot-bangla-41807.firebasestorage.app",
      messagingSenderId: "1065037227059",
      appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const table = urlParams.get('table');
    document.getElementById('tableDisplay').innerText = table ? "TABLE " + table : "SCAN QR";

    let cartTotal = 0; 
    let cartItems = {}; 

    // Dynamic Category Logic
    db.ref('menu_items').on('value', snap => {
        const content = document.getElementById('menuContent');
        const data = snap.val();
        content.innerHTML = '';
        if(!data) {
            content.innerHTML = '<p style="text-align:center; padding:50px; color:#444;">Menu is empty...</p>';
            return;
        }

        const categories = {};
        for(let id in data) {
            const cat = data[id].cat || "Other";
            if(!categories[cat]) categories[cat] = [];
            categories[cat].push(data[id]);
        }

        for(let catName in categories) {
            let section = `<div class="cat-section"><h2 class="cat-title">${catName}</h2>`;
            categories[catName].forEach(item => {
                section += `
                    <div class="menu-item">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p>₹${item.price}</p>
                            <div class="item-desc">${item.desc || ''}</div>
                        </div>
                        <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">ADD</button>
                    </div>`;
            });
            section += `</div>`;
            content.innerHTML += section;
        }
    });

    function addToCart(n, p) {
        if(cartItems[n]) { cartItems[n]++; } 
        else { cartItems[n] = 1; }
        
        cartTotal += parseInt(p);
        document.getElementById('totalAmt').innerText = cartTotal;
        document.getElementById('cart').style.display = 'block';
        if(navigator.vibrate) navigator.vibrate(40); 
    }

    function summonOrder() {
        if(!table) return alert("Please scan the Table QR first!");
        
        let btn = document.querySelector('.summon-btn');
        btn.innerText = "SENDING TO SPIRITS...";
        btn.disabled = true;

        let formattedItems = Object.keys(cartItems).map(key => `${key} x${cartItems[key]}`).join(", ");

        db.ref('orders').push({
            table: "Table " + table, 
            items: formattedItems, 
            totalAmount: cartTotal, 
            time: new Date().toLocaleTimeString(), 
            payment: 'Unpaid'
        }).then(() => { 
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            alert("☠️ ORDER RECEIVED! Your feast is being prepared.");
            location.reload(); // Reload back to clean menu
        }).catch(err => {
            alert("Error: Spirits are busy. Try again.");
            btn.innerText = "SUMMON THE FEAST";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
