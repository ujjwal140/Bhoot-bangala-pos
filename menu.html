<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bhoot Bangla | Digital Feast</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; background-image: radial-gradient(circle at top right, #2a0000 0%, #000 60%); color: #e0e0e0; font-family: 'Outfit', sans-serif; padding-bottom: 120px; overflow-x: hidden; min-height: 100vh; }
        .header { position: sticky; top: 0; z-index: 100; background: rgba(5, 0, 0, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); text-align: center; padding: 25px 20px; border-bottom: 1px solid rgba(255,26,26,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .header h1 { font-family: 'Cinzel', serif; color: #ff1a1a; letter-spacing: 6px; font-size: 28px; text-shadow: 0 0 25px rgba(255,26,26,0.5); font-weight: 800; }
        .header p { font-size: 11px; color: #aaa; letter-spacing: 4px; margin-top: 6px; font-weight: 500; text-transform: uppercase; }
        .cat-section { margin-top: 35px; padding: 0 20px; animation: fadeInUp 0.6s ease forwards; opacity: 0; transform: translateY(20px); }
        .cat-title { font-family: 'Cinzel', serif; color: #fff; font-size: 20px; border-bottom: 1px solid rgba(255,26,26,0.3); padding-bottom: 10px; margin-bottom: 20px; letter-spacing: 3px; position: relative; text-shadow: 0 2px 10px rgba(255,26,26,0.4); }
        .menu-item { background: linear-gradient(145deg, rgba(20,5,5,0.6) 0%, rgba(5,0,0,0.8) 100%); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; position: relative; overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.5); transition: transform 0.3s ease, border-color 0.3s; }
        .menu-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: #ff1a1a; box-shadow: 0 0 15px #ff1a1a; }
        .menu-item:active { transform: scale(0.98); border-color: rgba(255,26,26,0.3); }
        .item-info h3 { font-size: 18px; color: #fff; margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px; }
        .item-info p { color: #ff3333; font-weight: 700; font-size: 16px; text-shadow: 0 0 10px rgba(255,0,0,0.2); }
        .add-btn { background: rgba(255, 26, 26, 0.1); color: #ff1a1a; border: 1px solid rgba(255, 26, 26, 0.4); padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 14px; transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); letter-spacing: 1px; }
        .add-btn:active { background: #ff1a1a; color: #000; transform: scale(0.9); box-shadow: 0 0 20px rgba(255,26,26,0.6); }
        .cart-trigger { position: fixed; bottom: 25px; left: 5%; width: 90%; background: linear-gradient(90deg, #ff1a1a, #990000); color: #fff; border-radius: 16px; padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-shadow: 0 15px 40px rgba(255,0,0,0.3); cursor: pointer; font-family: 'Cinzel', serif; font-weight: 800; font-size: 16px; letter-spacing: 1px; animation: pulseGlow 2s infinite; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .cart-trigger:active { transform: translateY(4px) scale(0.98); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1500; opacity: 0; visibility: hidden; transition: 0.4s ease; }
        .overlay.active { opacity: 1; visibility: visible; }
        .cart-drawer { position: fixed; bottom: 0; left: 0; width: 100%; max-height: 85vh; background: rgba(10,2,2,0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-top-left-radius: 30px; border-top-right-radius: 30px; border-top: 1px solid rgba(255,26,26,0.3); z-index: 2000; padding: 30px 25px; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; flex-direction: column; box-shadow: 0 -20px 60px rgba(0,0,0,0.9); }
        .cart-drawer.active { transform: translateY(0); }
        .drawer-pill { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 0 auto 20px auto; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; margin-bottom: 20px; }
        .drawer-header h2 { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 22px; letter-spacing: 2px; }
        .close-btn { background: rgba(255,255,255,0.05); border: none; color: #aaa; width: 35px; height: 35px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .close-btn:active { background: rgba(255,26,26,0.2); color: #fff; }
        .cart-items-list { overflow-y: auto; flex-grow: 1; margin-bottom: 20px; padding-right: 5px; }
        .cart-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .qty-controls { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.6); border-radius: 30px; border: 1px solid rgba(255,26,26,0.2); padding: 4px 8px; }
        .qty-btn { background: transparent; color: #ff1a1a; border: none; font-size: 22px; width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; border-radius: 50%; }
        .qty-btn:active { background: rgba(255,26,26,0.2); }
        .table-badge { background: rgba(255,26,26,0.1); border: 1px solid #ff1a1a; color: #ff1a1a; padding: 6px 14px; border-radius: 8px; font-family: 'Cinzel', serif; font-size: 14px; font-weight: 800; letter-spacing: 1px; }
        .summon-btn { width: 100%; background: linear-gradient(90deg, #ff1a1a, #cc0000); color: #000; border: none; padding: 18px; border-radius: 14px; font-family: 'Cinzel', serif; font-weight: 800; font-size: 18px; margin-top: 15px; letter-spacing: 2px; box-shadow: 0 10px 25px rgba(255,26,26,0.3); transition: 0.2s; text-shadow: 0 1px 5px rgba(255,255,255,0.3); }
        .summon-btn:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(255,26,26,0.5); }
        
        /* === PREMIUM POPUP (TOAST) CSS === */
        .toast-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 3000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .toast-overlay.active { opacity: 1; visibility: visible; }
        .toast-box { background: linear-gradient(145deg, #150000, #000000); border: 1px solid rgba(255,26,26,0.4); padding: 35px 25px; border-radius: 20px; text-align: center; transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 15px 50px rgba(255,26,26,0.3); max-width: 85%; width: 340px; position: relative; overflow: hidden; }
        .toast-box::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:60%; height:2px; background:linear-gradient(90deg, transparent, #ff1a1a, transparent); }
        .toast-overlay.active .toast-box { transform: scale(1); }
        .toast-icon { font-size: 45px; margin-bottom: 15px; animation: pulseGlow 2s infinite; display: inline-block; }
        .toast-title { font-family: 'Cinzel', serif; color: #ff1a1a; font-size: 22px; margin-bottom: 10px; font-weight: 800; letter-spacing: 1px; }
        .toast-msg { color: #ccc; font-size: 15px; margin-bottom: 25px; line-height: 1.5; font-weight: 300; }
        .toast-btn { background: #ff1a1a; color: #000; border: none; padding: 14px; border-radius: 10px; font-weight: 800; font-family: 'Cinzel', serif; cursor: pointer; letter-spacing: 2px; width: 100%; font-size: 15px; transition: 0.2s; }
        .toast-btn:active { transform: scale(0.95); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 5px rgba(255,0,0,0.3)); } 50% { filter: drop-shadow(0 0 15px rgba(255,26,26,0.8)); } 100% { filter: drop-shadow(0 0 5px rgba(255,0,0,0.3)); } }
        .cat-section:nth-child(1) { animation-delay: 0.1s; } .cat-section:nth-child(2) { animation-delay: 0.2s; } .cat-section:nth-child(3) { animation-delay: 0.3s; } .cat-section:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BHOOT BANGLA</h1>
        <p>THE PREMIUM HAUNTED CAFE</p>
    </div>

    <div id="menuContent">
        <p style="text-align:center; padding:60px; color:#555; font-size: 18px; font-family:'Cinzel', serif; animation: pulseGlow 2s infinite;">Summoning the Menu...</p>
    </div>

    <div class="cart-trigger" id="cartTrigger" style="display:none" onclick="toggleDrawer(true)">
        <span>VIEW FEAST <span style="font-size:18px">🛒</span></span>
        <span style="background:rgba(0,0,0,0.3); padding:4px 10px; border-radius:10px;">₹<span id="triggerTotal">0</span></span>
    </div>

    <div class="overlay" id="overlay" onclick="toggleDrawer(false)"></div>
    <div class="cart-drawer" id="cartDrawer">
        <div class="drawer-pill"></div>
        <div class="drawer-header">
            <h2>YOUR SACRIFICE</h2>
            <button class="close-btn" onclick="toggleDrawer(false)">✕</button>
        </div>
        
        <div class="cart-items-list" id="cartItemsList"></div>
        
        <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
            <div id="tableDisplay" class="table-badge"></div>
            <div style="font-size:28px; font-weight:800; color:#fff;">₹<span id="drawerTotal">0</span></div>
        </div>
        <button class="summon-btn" id="summonBtn" onclick="summonOrder()">SUMMON THE SPIRITS</button>
    </div>

    <div class="toast-overlay" id="customToast">
        <div class="toast-box">
            <div class="toast-icon">☠️</div>
            <div class="toast-title">FEAST CONFIRMED!</div>
            <div class="toast-msg">The spirits have received your order. Please wait while your sacrifice is being prepared.</div>
            <button class="toast-btn" onclick="closeToast()">SURVIVE</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyB8QGSysMPyI1EqQTCCEx-Z6W7iIrwoaIQ",
      authDomain: "bhoot-bangla-41807.firebaseapp.com",
      databaseURL: "https://bhoot-bangla-41807-default-rtdb.firebaseio.com",
      projectId: "bhoot-bangla-41807",
      storageBucket: "bhoot-bangla-41807.firebasestorage.app",
      messagingSenderId: "1065037227059",
      appId: "1:1065037227059:web:ce2c3bb59f773dcbcd2f46"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const getToday = () => {
        let d = new Date();
        return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');
    };
    const today = getToday();
    
    const table = new URLSearchParams(window.location.search).get('table');
    document.getElementById('tableDisplay').innerText = table ? "TABLE " + table : "SCAN QR";

    let cartTotal = 0; let cartItems = {}; let itemPrices = {};

    db.ref('menu_items').on('value', snap => {
        const content = document.getElementById('menuContent');
        const data = snap.val();
        content.innerHTML = '';
        if(!data) {
            content.innerHTML = '<p style="text-align:center; padding:60px; color:#666;">The menu is currently empty.</p>';
            return;
        }

                const categories = {};
        for(let id in data) {
            // 🟢 MAGIC FIX: Category ko ek jaisa banane ke liye Uppercase aur Trim laga diya
            let rawCat = data[id].category || data[id].cat || "Other";
            const cat = rawCat.toUpperCase().trim(); 
            
            if(!categories[cat]) categories[cat] = [];
            categories[cat].push(data[id]);
            itemPrices[data[id].name] = parseInt(data[id].price);
        }

        for(let catName in categories) {
            let section = `<div class="cat-section"><h2 class="cat-title">${catName}</h2>`;
            categories[catName].forEach(item => {
                section += `
                    <div class="menu-item">
                        <div class="item-info">
                            <h3>${item.name}</h3>
                            <p>₹${item.price}</p>
                        </div>
                        <button class="add-btn" onclick="addToCart('${item.name}')">ADD +</button>
                    </div>
                `;
            });
            section += `</div>`;
            content.innerHTML += section;
        }


    function toggleDrawer(show) {
        document.getElementById('cartDrawer').classList.toggle('active', show);
        document.getElementById('overlay').classList.toggle('active', show);
        if(!show && cartTotal === 0) document.getElementById('cartTrigger').style.display = 'none';
    }

    function updateCartUI() {
        const list = document.getElementById('cartItemsList');
        list.innerHTML = ''; cartTotal = 0; let hasItems = false;

        for(let name in cartItems) {
            if(cartItems[name] > 0) {
                hasItems = true;
                const price = itemPrices[name] * cartItems[name];
                cartTotal += price;
                list.innerHTML += `
                    <div class="cart-row">
                        <div style="width: 45%;">
                            <span style="color:#fff; font-size:16px; font-weight:700;">${name}</span><br>
                            <span style="color:#777; font-size:12px;">₹${itemPrices[name]} each</span>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="changeQty('${name}', -1)">-</button>
                            <span style="color:#fff; font-weight:800; font-size:16px; min-width:20px; text-align:center;">${cartItems[name]}</span>
                            <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
                        </div>
                        <span style="color:#ff1a1a; font-weight:800; font-size:18px;">₹${price}</span>
                    </div>`;
            }
        }
        document.getElementById('triggerTotal').innerText = cartTotal;
        document.getElementById('drawerTotal').innerText = cartTotal;
        
        if(hasItems) { document.getElementById('cartTrigger').style.display = 'flex'; } 
        else { toggleDrawer(false); document.getElementById('cartTrigger').style.display = 'none'; }
    }

    function addToCart(n) {
        cartItems[n] = (cartItems[n] || 0) + 1;
        if(navigator.vibrate) navigator.vibrate(30);
        updateCartUI();
    }

    function changeQty(n, delta) {
        cartItems[n] += delta;
        if(cartItems[n] <= 0) delete cartItems[n];
        if(navigator.vibrate) navigator.vibrate(15);
        updateCartUI();
    }

function summonOrder() {
    if(!table) return alert("⚠️ Please scan the Table QR first!");
    let btn = document.getElementById('summonBtn');
    btn.innerText = "SENDING...";
    btn.disabled = true;

    // 1. Date (Format: 2026-04-21)
    let d = new Date();
    let todayDate = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, '0') + "-" + String(d.getDate()).padStart(2, '0');

    // 2. Items ko List (Array) banana
    let itemsArray = Object.keys(cartItems).map(key => {
        return {
            name: key,
            price: itemPrices[key],
            qty: cartItems[key]
        };
    });

    // 3. Database mein Push karna
    firebase.database().ref('orders/' + todayDate).push({
        table: "Table " + table,
        items: itemsArray,
        totalAmount: cartTotal,
        status: 'live',
        time: new Date().toLocaleTimeString(),
        payment: 'Unpaid'
    }).then(() => {
        document.getElementById('customToast').classList.add('active');
        cartItems = {};
        cartTotal = 0;
        updateCartUI();
        btn.innerText = "SUMMON THE SPIRITS";
        btn.disabled = false;
        if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50]);
    }).catch((e) => {
        alert("Error: " + e.message);
        btn.disabled = false;
    });
}
 
    function closeToast() {
        document.getElementById('customToast').classList.remove('active');
        location.reload(); 
    }
</script>
</body>
</html>
